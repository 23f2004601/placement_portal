{% extends "base.html" %}
{% block title %}Student Profile{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-lg border-0">
                <div class="card-header bg-primary text-white text-center py-4">
                    <i class="fas fa-user-graduate fa-3x mb-3"></i>
                    <h2 class="mb-0">Update Profile</h2>
                </div>
                <div class="card-body p-5">
                    <form method="POST" enctype="multipart/form-data">
                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label class="form-label fw-bold">Full Name *</label>
                                <input type="text" name="full_name" class="form-control form-control-lg" 
                                       value="{{ student.full_name }}" required>
                            </div>
                            <div class="col-md-6 mb-4">
                                <label class="form-label fw-bold">Roll Number *</label>
                                <input type="text" name="roll_number" class="form-control form-control-lg" 
                                       value="{{ student.roll_number }}" required>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label class="form-label">Department</label>
                                <input type="text" name="department" class="form-control" 
                                       value="{{ student.department or '' }}">
                            </div>
                            <div class="col-md-6 mb-4">
                                <label class="form-label">Year</label>
                                <input type="number" name="year" class="form-control" 
                                       value="{{ student.year or '' }}" min="1" max="4">
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label class="form-label">Phone</label>
                                <input type="tel" name="phone" class="form-control" 
                                       value="{{ student.phone or '' }}">
                            </div>
                            <div class="col-md-6 mb-4">
                                <label class="form-label">CGPA</label>
                                <input type="number" name="cgpa" class="form-control" step="0.01" 
                                       value="{{ student.cgpa or '' }}" min="0" max="10">
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold">Skills</label>
                            <textarea name="skills" class="form-control" rows="3">{{ student.skills or '' }}</textarea>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold">Upload Resume</label>
                            <input type="file" name="resume" class="form-control" accept=".pdf,.doc,.docx">
                            {% if student.resume_path %}
                                <small class="text-muted">Current: {{ student.resume_path.split('_')[-1] }}</small>
                            {% endif %}
                        </div>
                        
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg py-3">
                                <i class="fas fa-save me-2"></i>Update Profile
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
